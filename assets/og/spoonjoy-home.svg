<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title description">
  <title id="title">Spoonjoy — The Recipe App</title>
  <desc id="description">The recipe app for the meals you actually cook.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#211d18" flood-opacity="0.22"/>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fffdf8"/>
      <stop offset="1" stop-color="#eee7da"/>
    </linearGradient>
    <linearGradient id="tomato" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c56a4d"/>
      <stop offset="1" stop-color="#8f3f31"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#paper)"/>
  <circle cx="1120" cy="50" r="180" fill="#a66b2e" opacity="0.08"/>
  <circle cx="90" cy="610" r="210" fill="#b66134" opacity="0.06"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="70" y="86" fill="#a66b2e" font-size="25" font-weight="700" letter-spacing="7">SPOONJOY</text>
    <rect x="70" y="109" width="114" height="5" rx="2.5" fill="#b66134"/>
    <text x="70" y="194" fill="#28231d" font-family="Georgia, 'Times New Roman', serif" font-size="67" font-weight="700">
      <tspan x="70" dy="0">The recipe app</tspan>
      <tspan x="70" dy="77">for the meals</tspan>
      <tspan x="70" dy="77">you actually cook.</tspan>
    </text>
    <text x="73" y="458" fill="#655f55" font-family="Georgia, 'Times New Roman', serif" font-size="25">
      <tspan x="73" dy="0">Collect recipes. Shape cookbooks.</tspan>
      <tspan x="73" dy="36">Keep a kitchen that feels like yours.</tspan>
    </text>
    <g transform="translate(70 543)" fill="#655f55" font-size="18" font-weight="700" letter-spacing="2">
      <text x="0" y="0">COLLECT</text>
      <circle cx="116" cy="-6" r="3" fill="#b66134"/>
      <text x="137" y="0">COOKBOOKS</text>
      <circle cx="288" cy="-6" r="3" fill="#b66134"/>
      <text x="309" y="0">YOUR KITCHEN</text>
    </g>
    <text x="70" y="596" fill="#a66b2e" font-size="20" font-weight="700" letter-spacing="3">SPOONJOY.APP</text>
  </g>
  <g transform="translate(794 48)" filter="url(#shadow)">
    <rect width="346" height="534" rx="10" fill="#211d18"/>
    <rect x="24" y="24" width="298" height="486" rx="4" fill="none" stroke="#a66b2e" stroke-width="2"/>
    <text x="48" y="80" fill="#eee7da" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700">sj</text>
    <text x="108" y="76" fill="#a66b2e" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="4">A PERSONAL</text>
    <text x="108" y="98" fill="#a66b2e" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="4">RECIPE KITCHEN</text>
    <circle cx="173" cy="264" r="126" fill="#f8f5ee"/>
    <circle cx="173" cy="264" r="96" fill="#eee7da" stroke="#a66b2e" stroke-width="3"/>
    <path d="M112 258c18-38 55-57 91-39 32 16 38 57 12 79-30 26-87 15-103-20-3-7-3-14 0-20z" fill="url(#tomato)"/>
    <path d="M136 222c23 13 49 14 73 2" fill="none" stroke="#6f7c45" stroke-width="9" stroke-linecap="round"/>
    <path d="M184 204c6-12 17-19 31-20" fill="none" stroke="#6f7c45" stroke-width="8" stroke-linecap="round"/>
    <path d="M93 316c30 17 62 20 96 8" fill="none" stroke="#a66b2e" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <g transform="translate(69 410)">
      <rect width="208" height="58" rx="29" fill="#b66134"/>
      <text x="104" y="37" fill="#fffdf8" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="700" letter-spacing="2">RECIPES WORTH KEEPING</text>
    </g>
