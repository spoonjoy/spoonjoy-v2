name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  advisory:
    name: advisory
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: 📦 Activate pnpm
        run: |
          node scripts/run-with-warning-policy.mjs -- corepack enable
          node scripts/run-with-warning-policy.mjs -- corepack prepare pnpm@10.28.1 --activate

      - name: 🔒 Install pinned OSV-Scanner
        env:
          OSV_SCANNER_VERSION: v2.3.8
          OSV_SCANNER_TAG_SHA: 408fcd6f8707999a29e7ba45e15809764cf24f67
          OSV_SCANNER_LINUX_AMD64_SHA256: bc98e15319ed0d515e3f9235287ba53cdc5535d576d24fd573978ecfe9ab92dc
        run: |
          set -euo pipefail
          mkdir -p .cache/osv-scanner
          actual_tag_sha="$(curl -fsSL --retry 3 --retry-delay 2 "https://api.github.com/repos/google/osv-scanner/git/ref/tags/${OSV_SCANNER_VERSION}" | jq -er '.object | select(.type == "commit") | .sha')"
          test "$actual_tag_sha" = "$OSV_SCANNER_TAG_SHA"
          curl -fsSL --retry 3 --retry-delay 2 "https://github.com/google/osv-scanner/releases/download/${OSV_SCANNER_VERSION}/osv-scanner_linux_amd64" -o .cache/osv-scanner/osv-scanner
          printf '%s  %s\n' "$OSV_SCANNER_LINUX_AMD64_SHA256" ".cache/osv-scanner/osv-scanner" | sha256sum -c -
          chmod +x .cache/osv-scanner/osv-scanner
          printf 'OSV-Scanner %s verified tag %s\n' "$OSV_SCANNER_VERSION" "$actual_tag_sha"
          .cache/osv-scanner/osv-scanner --version

      - name: 📥 Install advisory dependencies without lifecycle scripts
        run: node scripts/run-with-warning-policy.mjs -- pnpm install --frozen-lockfile --ignore-scripts

      - name: 🔒 Run dependency advisory scan
        run: |
          test -f pnpm-lock.yaml
          node scripts/run-with-warning-policy.mjs -- pnpm run advisory:scan -- --scanner .cache/osv-scanner/osv-scanner --output .advisory/osv-results.json

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: 📦 Activate pnpm
        run: |
          node scripts/run-with-warning-policy.mjs -- corepack enable
          node scripts/run-with-warning-policy.mjs -- corepack prepare pnpm@10.28.1 --activate

      - name: 📥 Install dependencies
        run: node scripts/run-with-warning-policy.mjs -- pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma client
        run: node scripts/run-with-warning-policy.mjs -- pnpm prisma:generate

      - name: 🔒 Verify blake3 override resolution
        run: |
          node scripts/run-with-warning-policy.mjs -- pnpm why blake3-wasm
          node scripts/run-with-warning-policy.mjs -- pnpm why @c4312/blake3-internal

      - name: 🗄️ Apply D1 migrations (local)
        run: pnpm run verify:clean:migrations

      - name: 🗄️ Rehearse D1 migrations with QA bindings
        run: pnpm run verify:clean:migrations:qa

      - name: 🗄️ Apply Prisma schema to test database
        run: node scripts/run-with-warning-policy.mjs -- sh -c 'DATABASE_URL="file:./test.db" pnpm exec prisma db push --skip-generate'

      - name: 🔎 CI preflight - seed backend + migration status
        run: |
          echo "Seed script backend: Cloudflare D1 via wrangler getPlatformProxy()"
          DATABASE_URL=${DATABASE_URL:-'<unset>'}
          echo "DATABASE_URL=$DATABASE_URL"
          echo ""
          echo "Migrations status (wrangler):"
          node scripts/run-with-warning-policy.mjs -- pnpm exec wrangler d1 migrations list DB --local
          echo ""
          echo "Tables before seed:"
          node scripts/run-with-warning-policy.mjs -- pnpm exec wrangler d1 execute DB --local --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"

      - name: 🌱 Seed local D1 database
        run: node scripts/run-with-warning-policy.mjs -- pnpm db:seed

      - name: 🔍 Typecheck
        run: pnpm run verify:clean:typecheck

      - name: 🔐 Verify generated API contract
        run: pnpm run verify:clean:generated-contract

      - name: 🧪 Test & Coverage
        run: pnpm run verify:clean:test:coverage

      - name: 🏗️ Build
        run: pnpm run verify:clean:build

  workers-coverage:
    name: workers-coverage
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: 📦 Activate pnpm
        run: |
          node scripts/run-with-warning-policy.mjs -- corepack enable
          node scripts/run-with-warning-policy.mjs -- corepack prepare pnpm@10.28.1 --activate

      - name: 📥 Install dependencies
        run: node scripts/run-with-warning-policy.mjs -- pnpm install --frozen-lockfile

      - name: 🧪 Workers test coverage
        run: pnpm run verify:clean:test:workers:coverage

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: 📦 Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '22'

      - name: 📦 Activate pnpm
        run: |
          node scripts/run-with-warning-policy.mjs -- corepack enable
          node scripts/run-with-warning-policy.mjs -- corepack prepare pnpm@10.28.1 --activate

      - name: 📥 Install dependencies
        run: node scripts/run-with-warning-policy.mjs -- pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma client
        run: node scripts/run-with-warning-policy.mjs -- pnpm prisma:generate

      - name: 🔒 Verify blake3 override resolution
        run: |
          node scripts/run-with-warning-policy.mjs -- pnpm why blake3-wasm
          node scripts/run-with-warning-policy.mjs -- pnpm why @c4312/blake3-internal

      - name: 🎭 Install Playwright Browsers
        run: node scripts/run-with-warning-policy.mjs -- pnpm exec playwright install --with-deps chromium

      - name: 🗄️ Apply D1 migrations
        run: pnpm run verify:clean:migrations

      - name: 🌱 Seed local D1 database
        run: node scripts/run-with-warning-policy.mjs -- pnpm db:seed

      - name: 🎭 Run Playwright tests
        run: pnpm run verify:clean:test:e2e

      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
