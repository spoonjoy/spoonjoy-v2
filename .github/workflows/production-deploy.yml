name: Production Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact, successful main-branch CI SHA to deploy
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  issues: write

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}

jobs:
  deploy:
    name: deploy
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout approved source SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0

      - name: Validate release source
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$SOURCE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_sha must be an exact 40-character lowercase Git SHA" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Source SHA is not on origin/main" >&2
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            test "$WORKFLOW_RUN_CONCLUSION" = "success"
            test "$WORKFLOW_RUN_EVENT" = "push"
            test "$WORKFLOW_RUN_HEAD_BRANCH" = "main"
            test "$WORKFLOW_RUN_HEAD_SHA" = "$SOURCE_SHA"
          else
            matching_runs="$(
              gh run list --workflow CI --branch main --commit "$SOURCE_SHA" --event push --status success --limit 100 --json headSha |
                jq --arg source_sha "$SOURCE_SHA" '[.[] | select(.headSha == $source_sha)] | length'
            )"
            if [ "$matching_runs" -lt 1 ]; then
              echo "Source SHA has no successful main-branch push CI run" >&2
              exit 1
            fi
          fi

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy:auto

      - name: Record release source
        run: |
          # Markdown backticks are intentional literals in the step summary.
          # shellcheck disable=SC2016
          printf 'Source SHA: `%s`\n' "$SOURCE_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run MCP OAuth canary
        id: mcp-canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPOONJOY_MCP_CANARY_BASE_URL: https://spoonjoy.app
        run: pnpm run smoke:mcp:oauth -- --out mcp-oauth-canary-artifacts

      - name: Report MCP OAuth canary
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCP_CANARY_STATUS: ${{ steps.mcp-canary.outcome }}
          MCP_CANARY_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/report-mcp-oauth-canary.mjs --artifact-dir mcp-oauth-canary-artifacts --status "$MCP_CANARY_STATUS" --workflow-run-url "$MCP_CANARY_WORKFLOW_RUN_URL" --manage-issue

      - name: Upload MCP OAuth canary artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts/
          retention-days: 14
