name: Production Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact successful main-branch SHA to release
        required: true
        type: string
      rollback_version_id:
        description: Existing source-tagged Worker version ID for an intentional rollback
        required: false
        default: ""
        type: string
      csp_report_only_break_glass:
        description: Type ACK_REPORT_ONLY_CSP_ROLLBACK only for an intentional rollback to report-only, absent, or weakened CSP
        required: false
        default: ""
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}
  ROLLBACK_VERSION_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.rollback_version_id || '' }}
  SPOONJOY_RELEASE_MODE: atomic-bootstrap
  SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA: ""
  SPOONJOY_CSP_REPORT_ONLY_BREAK_GLASS: ${{ github.event_name == 'workflow_dispatch' && inputs.csp_report_only_break_glass || '' }}

jobs:
  deploy:
    name: deploy
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.path == '.github/workflows/ci.yml') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production

    steps:
      - name: Checkout approved source SHA
        if: env.ROLLBACK_VERSION_ID == ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Checkout trusted rollback tooling
        if: env.ROLLBACK_VERSION_ID != ''
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.workflow_sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release source
        env:
          GH_TOKEN: ${{ github.token }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_PATH: ${{ github.event.workflow_run.path }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$SOURCE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_sha must be an exact 40-character lowercase Git SHA" >&2
            exit 1
          fi
          case "$SPOONJOY_RELEASE_MODE" in
            atomic-bootstrap|atomic-product-activation|protocol-v1-canary) ;;
            *) exit 1 ;;
          esac
          if [ "$SPOONJOY_RELEASE_MODE" = "protocol-v1-canary" ]; then
            protocol_boundary_marker=workers/cook-session-protocol-v1-boundary
            test -f "$protocol_boundary_marker"
            marker_boundary_history="$(git log --format='%H' --diff-filter=A --reverse -- "$protocol_boundary_marker")"
            test "$(printf '%s\n' "$marker_boundary_history" | sed '/^$/d' | wc -l | tr -d ' ')" -eq 1
            marker_boundary_sha="$marker_boundary_history"
            test -n "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA"
            printf '%s' "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA" | grep -Eq '^[0-9a-f]{40}$'
            test "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA" = "$marker_boundary_sha"
            git merge-base --is-ancestor "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA" "$SOURCE_SHA"
          else
            test -z "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA"
          fi
          if [ -n "$ROLLBACK_VERSION_ID" ] && [ "$SPOONJOY_RELEASE_MODE" != "protocol-v1-canary" ]; then
            exit 1
          fi
          if [ -n "$ROLLBACK_VERSION_ID" ] && ! printf '%s' "$ROLLBACK_VERSION_ID" | grep -Eq '^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$'; then
            echo "rollback_version_id must be an exact Worker version UUID" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Source SHA is not on origin/main" >&2
            exit 1
          fi

          test "$WORKFLOW_RUN_PATH" = '.github/workflows/ci.yml' || test "$GITHUB_EVENT_NAME" = 'workflow_dispatch'
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            test -z "$ROLLBACK_VERSION_ID"
            test "$WORKFLOW_RUN_CONCLUSION" = "success"
            test "$WORKFLOW_RUN_EVENT" = "push"
            test "$WORKFLOW_RUN_HEAD_BRANCH" = "main"
            test "$WORKFLOW_RUN_HEAD_SHA" = "$SOURCE_SHA"
            test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
            test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          else
            if [ -z "$ROLLBACK_VERSION_ID" ]; then
              test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
              test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
            else
              test "$(git rev-parse HEAD)" = "$(git rev-parse origin/main)"
            fi
          fi

          node scripts/workflow-security.mjs validate-production-deploy-source

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Deploy staged release to Cloudflare Workers
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
          CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
          SPOONJOY_RELEASE_SHA: ${{ env.SOURCE_SHA }}
          SPOONJOY_MCP_CANARY_BASE_URL: https://spoonjoy.app
          SPOONJOY_CSP_REPORT_ONLY_BREAK_GLASS: ${{ env.SPOONJOY_CSP_REPORT_ONLY_BREAK_GLASS }}
        run: node scripts/workflow-security.mjs run-production-deploy

      - name: Record release source
        if: always()
        run: |
          # Markdown backticks are intentional literals in the step summary.
          # shellcheck disable=SC2016
          printf 'Source SHA: `%s`\n' "$SOURCE_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Ensure release artifact exists
        if: always()
        env:
          CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
          CLOUDFLARE_WORKERS_API_TOKEN: ${{ secrets.CLOUDFLARE_WORKERS_API_TOKEN }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p mcp-oauth-canary-artifacts
          artifact_path=mcp-oauth-canary-artifacts/production-release.json
          artifact_valid=0
          if [ -f "$artifact_path" ] && jq -e --arg source_sha "$SOURCE_SHA" --arg release_mode "$SPOONJOY_RELEASE_MODE" --arg protocol_boundary_sha "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA" 'type == "object" and ((keys - ["candidateVersionId", "databaseRollbackSupported", "deploymentStrategy", "failure", "migrationApply", "phase", "previousVersionId", "protocolV1BoundarySha", "releaseMode", "reviewedMigrations", "rollbackFailure", "sourceSha", "status", "treeHash"]) | length == 0) and ((["databaseRollbackSupported", "deploymentStrategy", "migrationApply", "phase", "releaseMode", "reviewedMigrations", "sourceSha", "status"] - keys) | length == 0) and (.sourceSha == $source_sha) and (.releaseMode == $release_mode) and (.deploymentStrategy == (if $release_mode == "protocol-v1-canary" then "gradual" else "atomic" end)) and (.databaseRollbackSupported == false) and (if $protocol_boundary_sha == "" then has("protocolV1BoundarySha") | not else .protocolV1BoundarySha == $protocol_boundary_sha end)' "$artifact_path" >/dev/null; then
            if jq -e 'def sanitized_failure: . as $failure | type == "string" and (length > 0 and length <= 500) and test("^\\S(?:.*\\S)?$") and (test("\\s{2,}") | not) and (test("[\u0000-\u001f\u007f]") | not) and (test("Bearer\\s+\\S+"; "i") | not) and (test("\\b(token|secret|password|authorization|api[_-]?key)\\s*[=:]\\s*\\S+"; "i") | not) and (test("\\b[A-Za-z0-9_-]{16,}\\.[A-Za-z0-9_-]{16,}\\.[A-Za-z0-9_-]{16,}\\b") | not) and all([($ENV.CLOUDFLARE_D1_API_TOKEN // ""), ($ENV.CLOUDFLARE_WORKERS_API_TOKEN // "")][]; . as $credential | length == 0 or ($failure | contains($credential) | not)); (.status | IN("promoted", "rollback_promoted", "failed_before_stage", "rolled_back", "rollback_failed", "forward_repair_required")) and (.phase | IN("validate", "provenance", "initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list", "migration_review", "migration_apply", "full_preflight", "current_deployment", "deployment_revalidation", "version_snapshot", "version_upload", "version_lookup", "stage_revalidation", "promotion_revalidation", "rollback_version_lookup", "rollback_current_deployment", "rollback_already_active", "protocol_ancestry", "rollback_protocol_ancestry", "active_version_mapping", "rollback_active_version_mapping", "stage", "canary", "candidate_csp", "promote", "atomic_deploy", "verify_promotion", "verify_rollback", "bootstrap_probe", "artifact", "complete")) and (.sourceSha | type == "string" and test("^[0-9a-f]{40}$")) and (if has("treeHash") then (.treeHash | type == "string" and test("^[0-9a-f]{40}$")) else true end) and (if has("previousVersionId") then (.previousVersionId | type == "string" and test("^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$")) else true end) and (if has("candidateVersionId") then (.candidateVersionId | type == "string" and test("^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$")) else true end) and (.migrationApply | IN("not_started", "not_needed", "attempted", "succeeded", "failed")) and (.reviewedMigrations | type == "array") and (all(.reviewedMigrations[]; type == "string")) and (if has("failure") then (.failure | sanitized_failure) else true end) and (if has("rollbackFailure") then (.rollbackFailure | sanitized_failure) else true end)' "$artifact_path" >/dev/null; then
              if jq -e '(all(.reviewedMigrations[]; (test("^[0-9]{4}_[A-Za-z0-9][A-Za-z0-9_.-]*[.]sql$") and (contains("..") | not)))) and ((.reviewedMigrations | unique | length) == (.reviewedMigrations | length)) and (if (has("previousVersionId") and has("candidateVersionId")) then (if .phase == "rollback_already_active" then .previousVersionId == .candidateVersionId else .previousVersionId != .candidateVersionId end) else true end) and (if .migrationApply == "not_needed" then (.reviewedMigrations | length) == 0 elif (.migrationApply | IN("attempted", "succeeded", "failed")) then (.reviewedMigrations | length) > 0 else true end)' "$artifact_path" >/dev/null; then
                if jq -e --arg release_mode "$SPOONJOY_RELEASE_MODE" '
                  (
                    if $release_mode == "protocol-v1-canary" then
                      if .status == "forward_repair_required" then
                        ((.phase == "migration_apply" and .migrationApply == "failed") or
                          ((.phase | IN("full_preflight", "deployment_revalidation", "version_upload", "version_lookup", "stage_revalidation")) and .migrationApply == "succeeded"))
                      elif .status == "failed_before_stage" then
                        (.migrationApply | IN("not_started", "not_needed"))
                      else true
                      end
                    else
                      (.status | IN("rollback_promoted", "rolled_back", "rollback_failed") | not) and
                      (if .status == "failed_before_stage" then
                        ((.phase | IN("validate", "provenance", "initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list", "migration_review", "current_deployment", "version_snapshot")) or
                          (.phase == "full_preflight" and .migrationApply == "not_needed") or
                          (.phase == "deployment_revalidation" and (.migrationApply | IN("not_started", "not_needed"))))
                      else true end) and
                      (if .phase == "bootstrap_probe" then $release_mode == "atomic-bootstrap" else true end)
                    end
                  ) and
                  (
                    if .status == "promoted" then
                      (.phase == "complete" and has("treeHash") and has("previousVersionId") and has("candidateVersionId") and
                        (has("failure") | not) and (has("rollbackFailure") | not) and
                        (.migrationApply | IN("not_needed", "succeeded")))
                    elif .status == "rollback_promoted" then
                      (.phase == "complete" and has("treeHash") and has("previousVersionId") and has("candidateVersionId") and
                        (has("failure") | not) and (has("rollbackFailure") | not) and
                        .migrationApply == "not_needed" and (.reviewedMigrations | length) == 0)
                    elif .status == "failed_before_stage" then
                      ((.phase | IN("validate", "provenance", "initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list", "migration_review", "full_preflight", "current_deployment", "deployment_revalidation", "version_snapshot", "version_upload", "version_lookup", "stage_revalidation", "rollback_version_lookup", "rollback_current_deployment", "rollback_already_active", "protocol_ancestry", "rollback_protocol_ancestry", "active_version_mapping", "rollback_active_version_mapping")) and
                        has("failure") and (has("rollbackFailure") | not) and
                        (if (.phase | IN("protocol_ancestry", "active_version_mapping")) then .migrationApply == "not_started"
                        elif (.phase | IN("rollback_version_lookup", "rollback_current_deployment", "rollback_already_active", "rollback_protocol_ancestry", "rollback_active_version_mapping")) then .migrationApply == "not_needed"
                        elif (.phase | IN("validate", "provenance")) then
                          (if $release_mode == "protocol-v1-canary" then (.migrationApply | IN("not_started", "not_needed")) else .migrationApply == "not_started" end)
                        elif (.phase | IN("initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list", "migration_review", "current_deployment", "version_snapshot")) then .migrationApply == "not_started"
                        elif .phase == "deployment_revalidation" then (.migrationApply | IN("not_started", "not_needed", "succeeded"))
                        else (.migrationApply | IN("not_needed", "succeeded"))
                        end) and
                        (if (.phase | IN("initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list", "migration_review", "migration_apply", "full_preflight", "current_deployment", "deployment_revalidation", "version_snapshot", "version_upload", "version_lookup", "stage_revalidation", "rollback_version_lookup", "rollback_current_deployment", "rollback_already_active", "protocol_ancestry", "rollback_protocol_ancestry", "active_version_mapping", "rollback_active_version_mapping")) then has("treeHash") else (has("treeHash") | not) end) and
                        (if (.phase | IN("rollback_current_deployment", "migration_review")) then true
                        elif (.phase | IN("version_snapshot", "migration_apply", "full_preflight", "deployment_revalidation", "version_upload", "version_lookup", "stage_revalidation", "rollback_already_active", "protocol_ancestry", "rollback_protocol_ancestry", "active_version_mapping", "rollback_active_version_mapping")) then has("previousVersionId")
                        else (has("previousVersionId") | not)
                        end) and
                        (if (.phase | IN("stage_revalidation", "rollback_current_deployment", "rollback_already_active", "rollback_protocol_ancestry", "rollback_active_version_mapping")) then has("candidateVersionId") else (has("candidateVersionId") | not) end))
                    elif .status == "rolled_back" then
                      ((.phase | IN("stage", "canary", "candidate_csp", "promotion_revalidation", "promote", "verify_promotion", "artifact")) and
                        has("treeHash") and has("previousVersionId") and has("candidateVersionId") and
                        has("failure") and (has("rollbackFailure") | not) and
                        (.migrationApply | IN("not_needed", "succeeded")))
                    elif .status == "rollback_failed" then
                      ((.phase | IN("stage", "canary", "candidate_csp", "promotion_revalidation", "promote", "verify_promotion", "artifact")) and
                        has("treeHash") and has("previousVersionId") and has("candidateVersionId") and
                        has("failure") and has("rollbackFailure") and
                        (.migrationApply | IN("not_needed", "succeeded")))
                    else
                      ((.phase | IN("migration_apply", "full_preflight", "deployment_revalidation", "version_upload", "version_lookup", "stage_revalidation", "atomic_deploy", "verify_promotion", "bootstrap_probe", "artifact")) and
                        has("treeHash") and has("previousVersionId") and has("failure") and
                        (has("rollbackFailure") | not) and
                        (if $release_mode == "protocol-v1-canary" and .phase == "stage_revalidation" then has("candidateVersionId")
                        elif $release_mode != "protocol-v1-canary" and (.phase | IN("verify_promotion", "bootstrap_probe", "artifact")) then has("candidateVersionId")
                        else (has("candidateVersionId") | not)
                        end) and
                        (if .phase == "migration_apply" then .migrationApply == "failed"
                        elif (.phase | IN("full_preflight", "deployment_revalidation")) then .migrationApply == "succeeded"
                        elif $release_mode == "protocol-v1-canary" and (.phase | IN("version_upload", "version_lookup", "stage_revalidation")) then .migrationApply == "succeeded"
                        else (.migrationApply | IN("not_needed", "succeeded"))
                        end))
                    end
                  ) and
                  (if (.phase | IN("validate", "provenance", "initial_preflight", "build", "post_build_posthog", "post_build_provenance", "migration_list")) then
                    (.reviewedMigrations | length) == 0
                  elif .phase == "migration_review" then
                    (.reviewedMigrations | length) > 0
                  else true
                  end) and
                  (if .phase == "migration_apply" then
                    ((.treeHash | type == "string") and (.previousVersionId | type == "string") and ((.reviewedMigrations | length) > 0))
                  else true
                  end)
                ' "$artifact_path" >/dev/null; then
                  artifact_valid=1
                fi
              fi
            fi
          fi
          if [ "$artifact_valid" -ne 1 ]; then
            jq -n --arg source_sha "$SOURCE_SHA" --arg release_mode "$SPOONJOY_RELEASE_MODE" --arg protocol_boundary_sha "$SPOONJOY_PROTOCOL_V1_BOUNDARY_SHA" '({status: (if $release_mode == "protocol-v1-canary" then "release_state_unknown" else "forward_repair_required" end), sourceSha: (if ($source_sha | test("^[0-9a-f]{40}$")) then $source_sha else null end), releaseMode: $release_mode, deploymentStrategy: (if $release_mode == "protocol-v1-canary" then "gradual" else "atomic" end), phase: "unknown", reviewedMigrations: null, migrationApply: "unknown", databaseRollbackSupported: false, failure: "Release workflow failed without a trustworthy orchestrator artifact."} + (if $protocol_boundary_sha == "" then {} else {protocolV1BoundarySha: $protocol_boundary_sha} end))' > "${artifact_path}.tmp"
            mv "${artifact_path}.tmp" "$artifact_path"
          fi

      - name: Upload MCP OAuth canary artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts/
          if-no-files-found: error
          retention-days: 14

  report-canary:
    name: report-canary
    if: always() && needs.deploy.result != 'skipped'
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout released source SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.workflow_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Download MCP OAuth canary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        continue-on-error: true
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts

      - name: Report MCP OAuth canary
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCP_CANARY_STATUS: ${{ needs.deploy.result }}
          MCP_CANARY_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MCP_CANARY_ARTIFACT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
        run: node scripts/report-mcp-oauth-canary.mjs --artifact-dir mcp-oauth-canary-artifacts --status "$MCP_CANARY_STATUS" --workflow-run-url "$MCP_CANARY_WORKFLOW_RUN_URL" --artifact-url "$MCP_CANARY_ARTIFACT_URL" --manage-issue
