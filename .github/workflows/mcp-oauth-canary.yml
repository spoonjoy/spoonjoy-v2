name: MCP OAuth Canary

on:
  workflow_dispatch:
  schedule:
    - cron: "23 * * * *"

concurrency:
  group: mcp-oauth-canary
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  canary:
    name: canary
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check GitHub Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping MCP OAuth canary because Cloudflare GitHub secrets are not configured."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.cloudflare.outputs.ready == 'true'

      - name: Setup Node.js
        if: steps.cloudflare.outputs.ready == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        if: steps.cloudflare.outputs.ready == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm prisma:generate

      - name: Install Playwright Chromium
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run MCP OAuth canary
        id: mcp-canary
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPOONJOY_MCP_CANARY_BASE_URL: https://spoonjoy.app
        run: pnpm run smoke:mcp:oauth -- --out mcp-oauth-canary-artifacts

      - name: Report MCP OAuth canary
        if: always() && steps.cloudflare.outputs.ready == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCP_CANARY_STATUS: ${{ steps.mcp-canary.outcome }}
          MCP_CANARY_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/report-mcp-oauth-canary.mjs --artifact-dir mcp-oauth-canary-artifacts --status "$MCP_CANARY_STATUS" --workflow-run-url "$MCP_CANARY_WORKFLOW_RUN_URL" --manage-issue

      - name: Upload MCP OAuth canary artifacts
        if: always() && steps.cloudflare.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts/
          retention-days: 14
