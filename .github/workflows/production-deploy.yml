name: Production Deploy

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact successful main-branch SHA to release
        required: true
        type: string
      allow_rollback:
        description: Permit an older successful main SHA for an intentional rollback
        required: true
        default: false
        type: boolean

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  actions: read
  contents: read

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  SOURCE_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || inputs.source_sha }}

jobs:
  deploy:
    name: deploy
    if: (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.path == '.github/workflows/ci.yml') || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 40
    environment: production

    steps:
      - name: Checkout approved source SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release source
        env:
          GH_TOKEN: ${{ github.token }}
          ALLOW_ROLLBACK: ${{ inputs.allow_rollback || false }}
          WORKFLOW_RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          WORKFLOW_RUN_EVENT: ${{ github.event.workflow_run.event }}
          WORKFLOW_RUN_HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WORKFLOW_RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          WORKFLOW_RUN_PATH: ${{ github.event.workflow_run.path }}
        run: |
          set -euo pipefail

          if ! printf '%s' "$SOURCE_SHA" | grep -Eq '^[0-9a-f]{40}$'; then
            echo "source_sha must be an exact 40-character lowercase Git SHA" >&2
            exit 1
          fi

          git fetch --no-tags origin main:refs/remotes/origin/main
          if ! git merge-base --is-ancestor "$SOURCE_SHA" origin/main; then
            echo "Source SHA is not on origin/main" >&2
            exit 1
          fi

          test "$WORKFLOW_RUN_PATH" = '.github/workflows/ci.yml' || test "$GITHUB_EVENT_NAME" = 'workflow_dispatch'
          if [ "$GITHUB_EVENT_NAME" = "workflow_run" ]; then
            test "$WORKFLOW_RUN_CONCLUSION" = "success"
            test "$WORKFLOW_RUN_EVENT" = "push"
            test "$WORKFLOW_RUN_HEAD_BRANCH" = "main"
            test "$WORKFLOW_RUN_HEAD_SHA" = "$SOURCE_SHA"
            test "$(git rev-parse origin/main)" = "$SOURCE_SHA"
          else
            test "$(git rev-parse origin/main)" = "$SOURCE_SHA" || test "$ALLOW_ROLLBACK" = "true"
          fi

          matching_runs="$(
            gh run list --workflow .github/workflows/ci.yml --branch main --commit "$SOURCE_SHA" --event push --status success --limit 100 --json headSha |
              jq --arg source_sha "$SOURCE_SHA" '[.[] | select(.headSha == $source_sha)] | length'
          )"
          if [ "$matching_runs" -lt 1 ]; then
            echo "Source SHA has no successful canonical main-branch CI run" >&2
            exit 1
          fi

          required_checks='["coverage","e2e","build-storybook"]'
          for attempt in $(seq 1 30); do
            check_runs="$(gh api --method GET "repos/$GITHUB_REPOSITORY/commits/$SOURCE_SHA/check-runs?per_page=100")"
            missing_checks="$(
              jq --argjson required "$required_checks" \
                '$required - ([.check_runs[] | select(.conclusion == "success") | .name] | unique)' \
                <<<"$check_runs"
            )"
            if [ "$missing_checks" = "[]" ]; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              echo "Required successful checks are missing: $missing_checks" >&2
              exit 1
            fi
            sleep 10
          done

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Deploy staged release to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPOONJOY_RELEASE_SHA: ${{ env.SOURCE_SHA }}
          SPOONJOY_MCP_CANARY_BASE_URL: https://spoonjoy.app
        run: pnpm run deploy:auto

      - name: Record release source
        if: always()
        run: |
          # Markdown backticks are intentional literals in the step summary.
          # shellcheck disable=SC2016
          printf 'Source SHA: `%s`\n' "$SOURCE_SHA" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload MCP OAuth canary artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts/
          if-no-files-found: error
          retention-days: 14

  report-canary:
    name: report-canary
    if: always()
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout released source SHA
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ env.SOURCE_SHA }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Download MCP OAuth canary artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts

      - name: Report MCP OAuth canary
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCP_CANARY_STATUS: ${{ needs.deploy.result }}
          MCP_CANARY_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          MCP_CANARY_ARTIFACT_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}#artifacts
        run: node scripts/report-mcp-oauth-canary.mjs --artifact-dir mcp-oauth-canary-artifacts --status "$MCP_CANARY_STATUS" --workflow-run-url "$MCP_CANARY_WORKFLOW_RUN_URL" --artifact-url "$MCP_CANARY_ARTIFACT_URL" --manage-issue
