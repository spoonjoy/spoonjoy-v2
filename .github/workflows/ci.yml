name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.28.1'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma client
        run: pnpm prisma:generate

      - name: 🔒 Verify blake3 override resolution
        run: |
          pnpm why blake3-wasm
          pnpm why @c4312/blake3-internal

      - name: 🗄️ Apply D1 migrations (local)
        run: pnpm exec wrangler d1 migrations apply DB --local

      - name: 🗄️ Apply Prisma schema to test database
        run: DATABASE_URL="file:./test.db" pnpm exec prisma db push --skip-generate

      - name: 🔎 CI preflight - seed backend + migration status
        run: |
          echo "Seed script backend: Cloudflare D1 via wrangler getPlatformProxy()"
          DATABASE_URL=${DATABASE_URL:-'<unset>'}
          echo "DATABASE_URL=$DATABASE_URL"
          echo ""
          echo "Migrations status (wrangler):"
          pnpm exec wrangler d1 migrations list DB --local
          echo ""
          echo "Tables before seed:"
          pnpm exec wrangler d1 execute DB --local --command "SELECT name FROM sqlite_master WHERE type='table' ORDER BY name;"

      - name: 🌱 Seed local D1 database
        run: pnpm db:seed

      - name: 🔍 Typecheck
        run: pnpm run typecheck

      - name: 🧪 Test & Coverage
        run: pnpm test:coverage

      - name: 🏗️ Build
        run: pnpm build

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.28.1'

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: 📥 Install dependencies
        run: pnpm install --frozen-lockfile

      - name: 🔧 Generate Prisma client
        run: pnpm prisma:generate

      - name: 🔒 Verify blake3 override resolution
        run: |
          pnpm why blake3-wasm
          pnpm why @c4312/blake3-internal

      - name: 🎭 Install Playwright Browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: 🗄️ Apply D1 migrations
        run: pnpm exec wrangler d1 migrations apply DB --local

      - name: 🌱 Seed local D1 database
        run: pnpm db:seed

      - name: 🎭 Run Playwright tests
        run: pnpm test:e2e

      - name: 📤 Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
