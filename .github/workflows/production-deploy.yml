name: Production Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Activate pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: pnpm run deploy:auto

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run MCP OAuth canary
        id: mcp-canary
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          SPOONJOY_MCP_CANARY_BASE_URL: https://spoonjoy.app
        run: pnpm run smoke:mcp:oauth -- --out mcp-oauth-canary-artifacts

      - name: Report MCP OAuth canary
        if: always()
        env:
          GITHUB_TOKEN: ${{ github.token }}
          MCP_CANARY_STATUS: ${{ steps.mcp-canary.outcome }}
          MCP_CANARY_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: node scripts/report-mcp-oauth-canary.mjs --artifact-dir mcp-oauth-canary-artifacts --status "$MCP_CANARY_STATUS" --workflow-run-url "$MCP_CANARY_WORKFLOW_RUN_URL" --manage-issue

      - name: Upload MCP OAuth canary artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: mcp-oauth-canary-artifacts
          path: mcp-oauth-canary-artifacts/
          retention-days: 14
