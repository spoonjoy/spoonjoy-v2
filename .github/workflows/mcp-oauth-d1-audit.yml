name: MCP OAuth D1 Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "41 * * * *"

concurrency:
  group: mcp-oauth-d1-audit
  cancel-in-progress: false

permissions:
  contents: read

env:
  GIT_CONFIG_COUNT: "1"
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  audit:
    name: audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check GitHub Cloudflare credentials
        id: cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Skipping MCP OAuth D1 audit because Cloudflare GitHub secrets are not configured."
            exit 0
          fi
          echo "ready=true" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        if: steps.cloudflare.outputs.ready == 'true'

      - name: Setup Node.js
        if: steps.cloudflare.outputs.ready == 'true'
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: "22"

      - name: Activate pnpm
        if: steps.cloudflare.outputs.ready == 'true'
        run: |
          corepack enable
          corepack prepare pnpm@10.28.1 --activate

      - name: Install dependencies
        if: steps.cloudflare.outputs.ready == 'true'
        run: pnpm install --frozen-lockfile

      - name: Run MCP OAuth D1 audit
        id: mcp-oauth-d1-audit
        if: steps.cloudflare.outputs.ready == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          MCP_OAUTH_AUDIT_WORKFLOW_RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: pnpm run audit:mcp:oauth -- --out mcp-oauth-d1-audit-artifacts

      - name: Upload MCP OAuth D1 audit artifacts
        if: always() && steps.cloudflare.outputs.ready == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: mcp-oauth-d1-audit-artifacts
          path: mcp-oauth-d1-audit-artifacts/
          retention-days: 14
